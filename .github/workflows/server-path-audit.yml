name: Temporary SkyGuardian server path audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/server-path-audit.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SKYGUARDIAN_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          SSH_PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Inspect configured document root
        env:
          SSH_HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          SSH_PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
          SSH_USER: ${{ secrets.SKYGUARDIAN_SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'set -eu
            echo "NGINX_SITE_PATHS"
            find /etc/nginx/sites-enabled -maxdepth 1 -type f -o -type l 2>/dev/null | sort
            echo "SKYGUARDIAN_CONFIG"
            sed -n "1,140p" /etc/nginx/sites-enabled/skyguardian 2>/dev/null || true
            echo "LOCAL_HTTP_CHECK"
            curl -sS -D - -H "Host: skyguardian.pp.ua" http://127.0.0.1/?page=login -o /tmp/sky-audit-body || true
            sed -n "1,12p" /tmp/sky-audit-body 2>/dev/null || true
            echo "DEPLOYED_FILES"
            find /var/www/SkyGuardianUa -maxdepth 3 -type f -printf "%p\n" 2>/dev/null | sort
          '
