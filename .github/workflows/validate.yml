name: Validate SkyGuardian

on:
  push:
    branches:
      - fix/channel-account-publication
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: PHP syntax
        run: find public src bin -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Composer validation
        run: composer validate --strict
