name: Deploy worker notifications

on:
  push:
    branches: [main]
    paths:
      - 'bin/worker-notification-watch.php'
      - 'src/Worker/WorkerAlertService.php'
      - 'src/Worker/TelegramBotNotifier.php'
      - 'deploy/skyguardian-worker-notifications.service'
      - 'deploy/skyguardian-worker-notifications.timer'
      - '.github/workflows/deploy-worker-notifications.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skyguardian-worker-notifications-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate notification runtime
        run: |
          set -euo pipefail
          php -l bin/worker-notification-watch.php
          php -l src/Worker/WorkerAlertService.php
          php -l src/Worker/TelegramBotNotifier.php
          test -f deploy/skyguardian-worker-notifications.service
          test -f deploy/skyguardian-worker-notifications.timer
          grep -q 'OnUnitActiveSec=60s' deploy/skyguardian-worker-notifications.timer

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SKYGUARDIAN_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          SSH_PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Install notification timer
        env:
          SSH_HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          SSH_PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
          SSH_USER: ${{ secrets.SKYGUARDIAN_SSH_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/id_ed25519 -P "$SSH_PORT" \
            deploy/skyguardian-worker-notifications.service \
            deploy/skyguardian-worker-notifications.timer \
            "$SSH_USER@$SSH_HOST:/tmp/"
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          target=/var/www/SkyGuardianUa
          test -f "$target/bin/worker-notification-watch.php"
          test -f "$target/vendor/autoload.php"
          install -m 644 /tmp/skyguardian-worker-notifications.service /etc/systemd/system/skyguardian-worker-notifications.service
          install -m 644 /tmp/skyguardian-worker-notifications.timer /etc/systemd/system/skyguardian-worker-notifications.timer
          install -d -m 2770 -o root -g www-data "$target/storage"
          for file in worker-notifications.json worker-notification-state.json worker-notification-watch-state.json worker-notification-journal.json; do
            if test -f "$target/storage/$file"; then
              chown www-data:www-data "$target/storage/$file"
              chmod 600 "$target/storage/$file"
            fi
          done
          systemctl daemon-reload
          systemctl enable --now skyguardian-worker-notifications.timer
          systemctl start skyguardian-worker-notifications.service || true
          systemctl is-enabled --quiet skyguardian-worker-notifications.timer
          systemctl is-active --quiet skyguardian-worker-notifications.timer
          systemctl list-timers skyguardian-worker-notifications.timer --no-pager
          rm -f /tmp/skyguardian-worker-notifications.service /tmp/skyguardian-worker-notifications.timer
          REMOTE
