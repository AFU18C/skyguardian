name: Deploy SkyGuardian

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'bin/**'
      - 'artisan'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skyguardian-server-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install production dependencies
        run: |
          set -euo pipefail
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Validate application
        run: |
          set -euo pipefail
          php -l public/index.php
          php -l public/telegram-account.php
          php -l public/telegram-account-core.php
          php -l public/data-channel.php
          php -l public/data-channel-status.php
          php -l public/data-channel-run.php
          php -l bin/data-channel-worker.php
          php -l artisan
          php artisan
          test -f vendor/autoload.php
          test -f public/assets/telegram-account.js
          test -f public/assets/data-channel.js
          test -f public/assets/data-channel-runtime.js

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SKYGUARDIAN_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          SSH_PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"
          test -n "$SSH_PORT"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload verified application
        env:
          SSH_HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          SSH_PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
          SSH_USER: ${{ secrets.SKYGUARDIAN_SSH_USER }}
        run: |
          set -euo pipefail
          test -n "$SSH_USER"
          tar -czf /tmp/skyguardian-release.tar.gz public bin artisan composer.json vendor
          scp -i ~/.ssh/id_ed25519 -P "$SSH_PORT" /tmp/skyguardian-release.tar.gz "$SSH_USER@$SSH_HOST:/tmp/skyguardian-release.tar.gz"
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'set -eu
            target=/var/www/SkyGuardianUa
            test "$target" = /var/www/SkyGuardianUa
            install -d -m 755 "$target"
            install -d -m 2770 "$target/storage"
            tar -xzf /tmp/skyguardian-release.tar.gz -C "$target"
            chmod 755 "$target" "$target/artisan" "$target/bin/data-channel-worker.php"

            if ! grep -q "telegram-account.js" "$target/public/index.php"; then
              sed -i "s#<script src=\"assets/app.js?v=38\"></script>#<script src=\"assets/app.js?v=38\"></script><script src=\"assets/telegram-account.js?v=3\"></script>#" "$target/public/index.php"
            else
              sed -i -E "s#telegram-account.js\?v=[0-9]+#telegram-account.js?v=3#g" "$target/public/index.php"
            fi
            if ! grep -q "data-channel.js" "$target/public/index.php"; then
              sed -i "s#</body>#<script src=\"assets/data-channel.js?v=1\"></script></body>#" "$target/public/index.php"
            else
              sed -i -E "s#data-channel.js\?v=[0-9]+#data-channel.js?v=1#g" "$target/public/index.php"
            fi
            if ! grep -q "data-channel-runtime.js" "$target/public/index.php"; then
              sed -i "s#</body>#<script src=\"assets/data-channel-runtime.js?v=2\"></script></body>#" "$target/public/index.php"
            else
              sed -i -E "s#data-channel-runtime.js\?v=[0-9]+#data-channel-runtime.js?v=2#g" "$target/public/index.php"
            fi

            if getent group www-data >/dev/null 2>&1; then
              chgrp www-data "$target/storage"
              chmod 2770 "$target/storage"
              install -d -m 2770 -o root -g www-data "$target/storage/backups"
              install -d -m 2770 -o root -g www-data "$target/storage/telegram-sessions"
              install -d -m 2770 -o root -g www-data "$target/storage/telegram-news-sessions"
              touch "$target/storage/data-channel-worker.lock"
              chown www-data:www-data "$target/storage/data-channel-worker.lock"
              chmod 660 "$target/storage/data-channel-worker.lock"
              if test -f "$target/storage/admin.json"; then
                chgrp www-data "$target/storage/admin.json"
                chmod 640 "$target/storage/admin.json"
              fi
              for data_file in telegram-accounts.json telegram-news-accounts.json telegram-news-channels.json telegram-alerts-channels.json telegram-news-channel-state.json telegram-alerts-channel-state.json; do
                if test -f "$target/storage/$data_file"; then
                  chown www-data:www-data "$target/storage/$data_file"
                  chmod 600 "$target/storage/$data_file"
                fi
              done
            else
              chmod 777 "$target/storage"
              install -d -m 777 "$target/storage/backups"
              install -d -m 777 "$target/storage/telegram-sessions"
              install -d -m 777 "$target/storage/telegram-news-sessions"
              touch "$target/storage/data-channel-worker.lock"
              chmod 666 "$target/storage/data-channel-worker.lock"
            fi

            find "$target/public" -type d -exec chmod 755 {} +
            find "$target/public" -type f -exec chmod 644 {} +
            find "$target/bin" -type d -exec chmod 755 {} +
            find "$target/bin" -type f -exec chmod 755 {} +
            find "$target/vendor" -type d -exec chmod 755 {} +
            find "$target/vendor" -type f -exec chmod 644 {} +

            cat > /etc/systemd/system/skyguardian-data-channels.service <<EOF
[Unit]
Description=SkyGuardian Telegram data channel monitor
After=network-online.target php8.3-fpm.service
Wants=network-online.target

[Service]
Type=simple
User=www-data
Group=www-data
WorkingDirectory=/var/www/SkyGuardianUa
ExecStart=/bin/bash -lc "while true; do /usr/bin/php /var/www/SkyGuardianUa/bin/data-channel-worker.php; sleep 1; done"
Restart=always
RestartSec=3
NoNewPrivileges=true
PrivateTmp=true

[Install]
WantedBy=multi-user.target
EOF
            systemctl daemon-reload
            systemctl enable --now skyguardian-data-channels.service
            systemctl restart skyguardian-data-channels.service

            rm -f /tmp/skyguardian-release.tar.gz
            test -f "$target/public/data-channel.php"
            test -f "$target/public/data-channel-status.php"
            test -f "$target/public/data-channel-run.php"
            test -f "$target/public/assets/data-channel.js"
            test -f "$target/public/assets/data-channel-runtime.js"
            test -f "$target/bin/data-channel-worker.php"
            test -w "$target/storage/data-channel-worker.lock"
            systemctl is-active --quiet skyguardian-data-channels.service

            nginx_site=/etc/nginx/sites-enabled/skyguardian
            if test -w "$nginx_site"; then
              sed -i -E "/fastcgi_param SG_ADMIN_(EMAIL|PASSWORD)/d" "$nginx_site"
              nginx -t
              systemctl reload nginx
            fi
          '
