name: Trigger full SkyGuardian backup

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/trigger-full-server-backup.yml'

permissions:
  actions: write
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch backup workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run full-server-backup.yml --repo "$GITHUB_REPOSITORY" --ref main
