name: Audit server before cleanup

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/server-audit.yml'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        env:
          KEY: ${{ secrets.SKYGUARDIAN_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts
      - name: Collect read-only inventory
        env:
          HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
          USER: ${{ secrets.SKYGUARDIAN_SSH_USER }}
        run: |
          set -euo pipefail
          {
            echo "checked_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$USER@$HOST" '
              echo "=== OS_AND_DISK ==="; uname -a; df -hT /
              echo "=== VAR_WWW ==="; find /var/www -mindepth 1 -maxdepth 2 -printf "%y %p\n" 2>/dev/null | sort; du -h -d 2 /var/www 2>/dev/null | sort -h
              echo "=== LARGE_TOP_LEVEL ==="; du -x -h -d 1 / 2>/dev/null | sort -h
              echo "=== NGINX_SITES ==="; ls -la /etc/nginx/sites-enabled /etc/nginx/sites-available 2>/dev/null || true
              echo "=== APACHE_SITES ==="; ls -la /etc/apache2/sites-enabled /etc/apache2/sites-available 2>/dev/null || true
              echo "=== MYSQL_DATABASES ==="; mysql -NBe "SELECT table_schema, ROUND(SUM(data_length+index_length)/1024/1024,1) FROM information_schema.tables GROUP BY table_schema ORDER BY 2 DESC;" 2>&1 || true
              echo "=== POSTGRES_DATABASES ==="; sudo -u postgres psql -Atc "SELECT datname||E'\t'||pg_size_pretty(pg_database_size(datname)) FROM pg_database ORDER BY pg_database_size(datname) DESC;" 2>&1 || true
              echo "=== DOCKER ==="; docker system df 2>&1 || true; docker ps -a --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" 2>&1 || true
              echo "=== SERVICES ==="; systemctl --type=service --state=running --no-pager --no-legend 2>/dev/null || true
              echo "=== CRON ==="; crontab -l 2>&1 || true; ls -la /etc/cron.d 2>/dev/null || true
            '
          } > server-audit.txt
      - name: Save report
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add server-audit.txt
          git commit -m "chore: save temporary server audit"
          git push
