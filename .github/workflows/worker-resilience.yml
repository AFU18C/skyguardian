name: Worker resilience checks

on:
  push:
    branches: [main]
    paths:
      - 'bin/data-channel-worker.php'
      - 'bin/worker-notification-watch.php'
      - 'bin/install-worker-monitor-ui.php'
      - 'bin/install-worker-notifications-ui.php'
      - 'public/worker-status.php'
      - 'public/worker-notifications.php'
      - 'public/assets/worker-monitor.*'
      - 'public/assets/worker-notifications.*'
      - 'deploy/skyguardian-worker-notifications.*'
      - 'deploy/worker-notifications-panel.php'
      - 'src/Worker/**'
      - 'src/Notification/**'
      - 'tests/worker-*.php'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/worker-resilience.yml'
      - '.github/workflows/deploy-worker-notifications.yml'
  pull_request:
    paths:
      - 'bin/data-channel-worker.php'
      - 'bin/worker-notification-watch.php'
      - 'bin/install-worker-monitor-ui.php'
      - 'bin/install-worker-notifications-ui.php'
      - 'public/worker-status.php'
      - 'public/worker-notifications.php'
      - 'public/assets/worker-monitor.*'
      - 'public/assets/worker-notifications.*'
      - 'deploy/skyguardian-worker-notifications.*'
      - 'deploy/worker-notifications-panel.php'
      - 'src/Worker/**'
      - 'src/Notification/**'
      - 'tests/worker-*.php'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/worker-resilience.yml'
      - '.github/workflows/deploy-worker-notifications.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-resilience-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, fileinfo, zlib, gmp, gd, iconv, curl
          coverage: none
          tools: composer:v2

      - name: Validate Composer configuration
        run: composer validate --no-check-publish --no-check-lock

      - name: Install dependencies and rebuild autoload
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: PHP syntax
        run: php -l bin/data-channel-worker.php && php -l bin/worker-notification-watch.php && php -l bin/install-worker-monitor-ui.php && php -l bin/install-worker-notifications-ui.php && php -l public/worker-status.php && php -l public/worker-notifications.php && php -l deploy/worker-notifications-panel.php && find src/Worker src/Notification tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Retry and metrics tests
        run: php tests/worker-resilience.php

      - name: Worker integration tests
        run: php tests/worker-integration.php

      - name: Worker status tests
        run: php tests/worker-status.php

      - name: Worker monitoring UI tests
        run: php tests/worker-monitor-ui.php

      - name: Worker notification tests
        run: php tests/worker-notifications.php

      - name: Notification API and timer tests
        run: php tests/worker-notification-api.php

      - name: Notification settings UI tests
        run: php tests/worker-notifications-ui.php
