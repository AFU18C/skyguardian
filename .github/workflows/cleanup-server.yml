name: Clean SkyGuardian server directory

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type CLEAN_SKYGUARDIAN to confirm'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: skyguardian-server-maintenance
  cancel-in-progress: false

jobs:
  clean:
    if: ${{ inputs.confirmation == 'CLEAN_SKYGUARDIAN' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SKYGUARDIAN_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          SSH_PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"
          test -n "$SSH_PORT"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Clean only SkyGuardian project directory
        env:
          SSH_HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          SSH_PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
          SSH_USER: ${{ secrets.SKYGUARDIAN_SSH_USER }}
        run: |
          set -euo pipefail
          test -n "$SSH_USER"
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'set -eu
            target=/var/www/SkyGuardianUa
            test "$target" = /var/www/SkyGuardianUa
            test -d "$target"
            find "$target" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
            remaining="$(find "$target" -mindepth 1 -maxdepth 1 -print -quit)"
            test -z "$remaining"
          '

      - name: Confirm cleanup
        run: echo "The contents of /var/www/SkyGuardianUa were removed successfully."
