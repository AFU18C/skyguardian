name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  php:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Validate Composer configuration
        run: composer validate --no-check-lock

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check optimized autoloading
        run: composer dump-autoload --optimize --strict-psr

      - name: Lint PHP sources
        run: find public src bin tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run project tests
        run: |
          status=0
          : > test-output.log
          for test in tests/*.php; do
            echo "Running $test" | tee -a test-output.log
            php "$test" 2>&1 | tee -a test-output.log || status=1
          done
          exit "$status"

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log

      - name: Run non-production runtime audit
        run: php bin/runtime-audit.php

      - name: Audit dependencies
        run: composer audit --no-interaction
