name: Remove confirmed obsolete server files

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/remove-obsolete-server-files.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        env:
          KEY: ${{ secrets.SKYGUARDIAN_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts
      - name: Remove only confirmed obsolete paths
        env:
          HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
          USER: ${{ secrets.SKYGUARDIAN_SSH_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$USER@$HOST" '
            set -eu
            test "/var/www/html" != "/var/www/SkyGuardianUa"
            rm -rf -- /var/www/html
            rm -f -- /etc/nginx/sites-available/skyguardian.backup-20260720-211925
            test ! -e /var/www/html
            test ! -e /etc/nginx/sites-available/skyguardian.backup-20260720-211925
            test -d /var/www/SkyGuardianUa
            test -L /etc/nginx/sites-enabled/skyguardian
            nginx -t
          '
          printf '%s\n' 'removed=/var/www/html' 'removed=/etc/nginx/sites-available/skyguardian.backup-20260720-211925' 'skyguardian_directory=preserved' 'nginx_config=valid' > server-cleanup-result.txt
      - name: Save verification
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add server-cleanup-result.txt
          git commit -m "chore: save temporary cleanup verification"
          git push
