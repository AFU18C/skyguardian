name: Audit SkyGuardian server

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/audit-server.yml'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          SSH_PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
          SSH_KEY: ${{ secrets.SKYGUARDIAN_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
      - name: Collect read-only audit
        env:
          SSH_HOST: ${{ secrets.SKYGUARDIAN_SSH_HOST }}
          SSH_PORT: ${{ secrets.SKYGUARDIAN_SSH_PORT }}
          SSH_USER: ${{ secrets.SKYGUARDIAN_SSH_USER }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -s' > server-audit.txt <<'REMOTE'
          set -u
          echo "AUDIT_TIME=$(date -Is)"
          echo "== OS / UPTIME =="; uname -a; uptime
          echo "== CPU / MEMORY =="; nproc; free -h; swapon --show
          echo "== DISK =="; df -hT; du -xhd1 /var /opt /srv 2>/dev/null | sort -h
          echo "== TOP MEMORY =="; ps -eo pid,comm,%cpu,%mem,rss --sort=-rss | head -20
          echo "== LISTENING PORTS =="; ss -lntup
          echo "== RUNNING SERVICES =="; systemctl list-units --type=service --state=running --no-pager
          echo "== ENABLED SERVICES =="; systemctl list-unit-files --type=service --state=enabled --no-pager
          echo "== DATABASE SERVICES =="; systemctl list-unit-files --type=service --no-pager | grep -Ei 'mysql|mariadb|postgres|redis|mongo' || true
          echo "== DATABASE PACKAGES =="; dpkg-query -W -f='${binary:Package}\t${Version}\n' 2>/dev/null | grep -Ei 'mysql|mariadb|postgresql|redis|mongodb' || true
          echo "== DATABASE DIRECTORIES =="; du -sh /var/lib/mysql /var/lib/postgresql /var/lib/redis /var/lib/mongodb 2>/dev/null || true
          echo "== PHP VERSION / MODULES =="; php -v 2>/dev/null || true; php -m 2>/dev/null || true
          echo "== PHP FPM =="; systemctl list-unit-files --type=service --no-pager | grep -E 'php.*fpm' || true
          echo "== NGINX =="; nginx -v 2>&1 || true; nginx -t 2>&1 || true
          echo "== WEB DIRECTORIES =="; find /var/www -maxdepth 2 -mindepth 1 -printf '%y %p\n' 2>/dev/null | sort
          echo "== CRON =="; ls -la /etc/cron.d /etc/cron.daily 2>/dev/null; crontab -l 2>/dev/null || true
          echo "== FAILED UNITS =="; systemctl --failed --no-pager || true
          echo "== AUTOREMOVE SIMULATION =="; apt-get -s autoremove 2>/dev/null || true
          echo "== JOURNAL SIZE =="; journalctl --disk-usage 2>/dev/null || true
          REMOTE
      - name: Publish report
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add server-audit.txt
          git commit -m "chore: publish temporary server audit"
          git push
