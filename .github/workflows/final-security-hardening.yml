name: Final security hardening

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, fileinfo, zlib, gmp, gd, iconv, curl
          coverage: none

      - name: Apply remaining security fixes
        run: python3 .github/scripts/final_security_hardening.py

      - name: Validate changes
        run: |
          php -l public/index.php
          php -l public/TelegramAutomation.php
          php tests/session-security.php
          php tests/admin-actions-security.php
          php tests/telegram-webhook-security.php
          php tests/public-endpoints-security.php

      - name: Commit verified hardening
        run: |
          rm .github/workflows/final-security-hardening.yml
          rm .github/scripts/final_security_hardening.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add public/index.php tests/session-security.php .github/workflows/final-security-hardening.yml .github/scripts/final_security_hardening.py
          git commit -m "Finish admin and upload security hardening"
          git push
