name: SkyGuardian v1 checks

on:
  push:
    branches: [rewrite/v1]
  pull_request:

permissions:
  contents: read

concurrency:
  group: skyguardian-v1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, xml, fileinfo, zlib, gmp, gd, iconv
          coverage: none
          tools: composer:v2

      - name: PHP environment
        run: |
          php -v
          php -m
          composer --version

      - name: Validate Composer files
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Check platform requirements
        run: composer check-platform-reqs

      - name: PHP syntax
        run: find src public/v1 bin tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Smoke tests
        run: php tests/smoke.php

      - name: Regression tests
        run: php tests/regression.php

      - name: Readiness tests
        run: php tests/readiness.php

      - name: HTTP integration tests
        run: bash tests/http-integration.sh
