name: SkyGuardian v1 checks

on:
  push:
    branches: [rewrite/v1]
  pull_request:

jobs:
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: PHP syntax
        run: find src public/v1 bin tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Smoke tests
        run: php tests/smoke.php
