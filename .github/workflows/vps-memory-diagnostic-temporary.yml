name: VPS Memory Diagnostic Temporary

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vps-memory-diagnostic-temporary.yml"

permissions:
  contents: write

jobs:
  diagnostic:
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect memory report
        shell: bash
        run: |
          report="$RUNNER_TEMP/vps-memory-diagnostic.txt"
          {
            echo "=== TIMESTAMP ==="
            date --iso-8601=seconds

            echo "=== MEMORY SUMMARY ==="
            free -h
            echo
            grep -E '^(MemTotal|MemFree|MemAvailable|Buffers|Cached|SReclaimable|Shmem|SwapTotal|SwapFree):' /proc/meminfo

            echo "=== TOP PROCESSES BY RSS ==="
            printf '%-8s %-8s %-14s %-24s %10s %6s\n' PID PPID USER COMMAND RSS_KiB MEM_PCT
            ps -eo pid=,ppid=,user=,comm=,rss=,%mem= --sort=-rss | head -30

            echo "=== MEMORY AGGREGATED BY COMMAND ==="
            ps -eo comm=,rss= | awk '
              {
                count[$1]++
                rss[$1] += $2
              }
              END {
                for (command in rss) {
                  printf "%10.1f MiB  %4d  %s\n", rss[command] / 1024, count[command], command
                }
              }
            ' | sort -k1,1nr | head -30

            echo "=== SYSTEMD CGROUP MEMORY ==="
            timeout 10s systemd-cgtop -b -n 1 --depth=2 2>/dev/null | head -50 || true

            echo "=== RUNNING SERVICES ==="
            systemctl list-units --type=service --state=running --no-pager --no-legend | head -80 || true

            echo "=== DOCKER CONTAINERS ==="
            if command -v docker >/dev/null 2>&1; then
              docker stats --no-stream --format 'table {{.Name}}\t{{.MemUsage}}\t{{.MemPerc}}' || true
            else
              echo "Docker is not installed"
            fi
          } > "$report"

      - name: Upload private diagnostic artifact
        uses: actions/upload-artifact@v4
        with:
          name: vps-memory-diagnostic
          path: ${{ runner.temp }}/vps-memory-diagnostic.txt
          retention-days: 1
          if-no-files-found: error

      - name: Record run ID temporarily
        shell: bash
        run: |
          printf '%s\n' "$GITHUB_RUN_ID" > .github/vps-memory-diagnostic-run-id.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/vps-memory-diagnostic-run-id.txt
          git commit -m "Record temporary VPS diagnostic run $GITHUB_RUN_ID"
          git push
